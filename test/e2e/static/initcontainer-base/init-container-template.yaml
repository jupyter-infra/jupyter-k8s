apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: init-container-template
  namespace: default
spec:
  displayName: "Template with Default Init Containers"
  defaultImage: jk8s-application-jupyter-uv:latest
  defaultResources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  defaultInitContainers:
    - name: template-init
      image: busybox:latest
      command: ["sh", "-c", "echo template-init-done"]
