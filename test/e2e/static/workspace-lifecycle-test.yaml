apiVersion: workspaces.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: lifecycle-test-workspace
spec:
  displayName: "Lifecycle Test Workspace"
  image: "jupyter/scipy-notebook:latest"
  desiredStatus: Running
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
