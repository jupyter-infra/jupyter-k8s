apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: default-labels-template
  namespace: jupyter-k8s-shared
spec:
  displayName: "Default Labels Template"
  description: "Template with addLabels and labelRequirements"
  defaultImage: jk8s-application-jupyter-uv:latest
  addLabels:
    - key: "env"
      value: "production"
    - key: "managed-by"
      value: "platform-team"
  labelRequirements:
    - key: "env"
      required: true
      regex: "^(production|staging)$"
    - key: "managed-by"
      required: true
