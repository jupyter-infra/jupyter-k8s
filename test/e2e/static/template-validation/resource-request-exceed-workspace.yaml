apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: resource-request-exceed-workspace
spec:
  displayName: "Resource Request Bounds Test"
  templateRef:
    name: base-template
    namespace: jupyter-k8s-shared
  ownershipType: Public
  resources:
    requests:
      cpu: "10"  # Exceeds template max of 2
      memory: "16Gi"  # Exceeds template max of 4Gi
      nvidia.com/gpu: "4"  # Exceeds template max of 1
