apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: ws-shared-access-strategy
  namespace: default
spec:
  displayName: "Workspace with shared access strategy"
  image: jk8s-application-jupyter-uv:latest
  accessStrategy:
    name: shared-access-strategy
    namespace: jupyter-k8s-shared
  desiredStatus: Running
  ownershipType: Public
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
