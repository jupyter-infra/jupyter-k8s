apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: local-default-template
  namespace: scope-team-a
  labels:
    workspace.jupyter.org/default-template: "true"
spec:
  displayName: "Local Default Template"
  defaultImage: jk8s-application-jupyter-uv:latest
  allowedImages:
    - jk8s-application-jupyter-uv:latest
  defaultResources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  resourceBounds:
    resources:
      cpu:
        min: 100m
        max: 2
      memory:
        min: 128Mi
        max: 4Gi
  primaryStorage:
    defaultSize: 1Gi
    minSize: 100Mi
    maxSize: 20Gi
  appType: jupyter
