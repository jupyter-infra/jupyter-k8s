apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: ws-integration-missing-param-rejected
  namespace: default
spec:
  desiredStatus: Running
  image: jk8s-application-jupyter-uv:latest
  # References a template that declares serviceName but supplies NO parameters -> rejected (parameter
  # completeness).
  integrationTemplateRefs:
    - name: valid-integration
      namespace: default
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
