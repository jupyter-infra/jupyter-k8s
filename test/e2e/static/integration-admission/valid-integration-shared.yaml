apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceIntegrationTemplate
metadata:
  name: valid-integration
  namespace: jupyter-k8s-shared
spec:
  displayName: Valid Integration in shared namespace (for bare-name stamping)
  # resourceRefs is required by the CRD (minItems=1); it is fetched only at controller resolve time, so
  # its target need not exist for the defaulter/validator admission path this fixture exercises.
  parameters:
    - name: serviceName
  resourceRefs:
    - name: cache
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ .Parameters.serviceName }}"
        namespace: "{{ .Workspace.Namespace }}"
