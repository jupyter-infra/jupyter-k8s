apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: ws-integration-bare-name
  namespace: default
spec:
  desiredStatus: Running
  image: jk8s-application-jupyter-uv:latest
  # Bare-name ref (no namespace). The mutating defaulter must resolve and STAMP the namespace: the
  # template exists only in the shared namespace here, so the stored ref should end up with
  # namespace: jupyter-k8s-shared. This is the ApplyIntegrationRefDefaults stamping path.
  integrationTemplateRefs:
    - name: valid-integration
      parameters:
        - name: serviceName
          value: shared-cache
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
