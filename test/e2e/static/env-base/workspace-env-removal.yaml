apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: workspace-env-removal
  namespace: default
spec:
  displayName: "Workspace for Env Removal"
  image: jk8s-application-jupyter-uv:latest
  desiredStatus: Running
  containerConfig:
    command:
      - /bin/bash
    args:
      - -c
      - start-notebook.sh
    env:
      - name: REMOVE_ME
        value: will-be-removed
      - name: ALSO_REMOVE
        value: also-removed
