apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: workspace-env-removal
  namespace: default
spec:
  displayName: "Workspace for Env Removal Test"
  image: jk8s-application-jupyter-uv:latest
  containerConfig:
    env:
      - name: REMOVE_ME
        value: will-be-removed
      - name: ALSO_REMOVE
        value: also-removed
