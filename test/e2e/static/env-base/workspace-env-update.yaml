apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: workspace-env-update
  namespace: default
spec:
  displayName: "Workspace for Env Update Test"
  image: jk8s-application-jupyter-uv:latest
  desiredStatus: Running
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    - name: MY_VAR
      value: initial-value
    - name: OLD_VAR
      value: old-value
