apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: pod-sc-workspace
spec:
  displayName: "Pod Security Context Workspace"
  image: jk8s-application-jupyter-uv:latest
  desiredStatus: Running
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsNonRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
