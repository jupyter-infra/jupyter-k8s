apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: env-template
  namespace: jupyter-k8s-shared
spec:
  displayName: "Environment Variables Template"
  description: "Template with container config including environment variables"
  defaultImage: jk8s-application-jupyter-uv:latest
  defaultContainerConfig:
    command:
      - /bin/bash
    args:
      - -c
      - start-notebook.sh
    env:
      - name: TEMPLATE_VAR
        value: template-value
      - name: JUPYTER_ENABLE_LAB
        value: "yes"
  resourceBounds:
    resources:
      cpu:
        min: 100m
        max: 4
      memory:
        min: 128Mi
        max: 8Gi
