apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: custom-annotations-workspace
  annotations:
    custom.io/annotation: "test-value"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  displayName: "Custom Annotations Workspace"
  image: jk8s-application-jupyter-uv:latest
  desiredStatus: Running
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
