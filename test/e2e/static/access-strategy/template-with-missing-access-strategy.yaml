apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: template-with-missing-access-strategy
  namespace: jupyter-k8s-shared
spec:
  displayName: "Template Referencing A Missing Access Strategy"
  defaultImage: jk8s-application-jupyter-uv:latest
  defaultAccessStrategy:
    name: template-protection-access-strategy-missing
    namespace: jupyter-k8s-shared
  resourceBounds:
    resources:
      cpu:
        min: 100m
        max: "2"
      memory:
        min: 128Mi
        max: 4Gi
