apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: readiness-probe-template
  namespace: jupyter-k8s-shared
spec:
  displayName: "Readiness Probe Template"
  defaultImage: jk8s-application-jupyter-uv:latest
  defaultReadinessProbe:
    tcpSocket:
      port: 8888
    initialDelaySeconds: 2
    periodSeconds: 3
    failureThreshold: 30
  resourceBounds:
    resources:
      cpu:
        min: 100m
        max: "2"
      memory:
        min: 128Mi
        max: 4Gi
