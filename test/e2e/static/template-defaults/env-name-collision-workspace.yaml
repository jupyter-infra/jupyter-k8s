apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: env-name-collision-workspace
  namespace: default
spec:
  displayName: "Workspace with Same-Name Env Override"
  desiredStatus: Running
  templateRef:
    name: env-template
    namespace: jupyter-k8s-shared
  env:
    - name: TEMPLATE_VAR
      value: workspace-wins
    - name: WORKSPACE_ONLY
      value: only-in-workspace
