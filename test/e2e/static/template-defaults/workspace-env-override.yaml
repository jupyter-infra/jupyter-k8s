apiVersion: workspace.jupyter.org/v1alpha1
kind: Workspace
metadata:
  name: workspace-env-override
  namespace: default
spec:
  displayName: "Workspace with Env Override"
  desiredStatus: Running
  templateRef:
    name: env-template
    namespace: jupyter-k8s-shared
  containerConfig:
    env:
      - name: WORKSPACE_VAR
        value: workspace-value
