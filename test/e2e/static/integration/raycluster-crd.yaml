apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rayclusters.ray.io
spec:
  group: ray.io
  names:
    kind: RayCluster
    listKind: RayClusterList
    plural: rayclusters
    singular: raycluster
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          # Minimal permissive schema sufficient for e2e resourceRefs tests.
          x-kubernetes-preserve-unknown-fields: true
      # NOTE: no status subresource. The fixture RayCluster carries an inline status
      # (head.serviceName) that the integration template resolves; a status subresource
      # would cause kubectl apply to silently strip that status.
