apiVersion: v1
kind: Service
metadata:
  name: shared-cache
  namespace: default
spec:
  clusterIP: None
  ports:
    # Same Service (shared-cache), drifted port. The integration's parametersHash is unchanged, so 2b
    # must replay the frozen port 6379 and never read this new value -- the pod must not roll.
    - name: redis
      port: 6390
