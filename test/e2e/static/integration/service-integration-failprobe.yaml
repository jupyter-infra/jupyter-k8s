apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceIntegrationTemplate
metadata:
  name: service-integration-failprobe
  namespace: default
spec:
  displayName: Shared Service Integration (failing status probe)
  parameters:
    - name: serviceName
  shareProcessNamespace: true
  resourceRefs:
    - name: cache
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ .Parameters.serviceName }}"
        namespace: "{{ .Workspace.Namespace }}"
  # A statusProbe that always exits non-zero: the integration still RESOLVES (sidecar injected), but the
  # probe reports Degraded -- proving probe health is report-only and does not gate availability.
  statusProbe:
    exec:
      command: ["false"]
  deploymentModifications:
    podModifications:
      additionalContainers:
        - name: cache-proxy
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - "echo connecting to {{ resource \"cache\" \"{.metadata.name}\" }}:{{ resource \"cache\" \"{.spec.ports[0].port}\" }} && sleep infinity"
      primaryContainerModifications:
        mergeEnv:
          - name: CACHE_HOST
            valueTemplate: '{{ resource "cache" "{.metadata.name}" }}'
