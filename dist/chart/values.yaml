## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
fullnameOverride: "jupyter-k8s"

## Configure the controller manager deployment
##
manager:
  replicas: 1

  image:
    repository: controller
    tag: latest
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Environment variables
  ##
  env:
    - name: CONTROLLER_POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: CONTROLLER_POD_SERVICE_ACCOUNT
      valueFrom:
        fieldRef:
          fieldPath: spec.serviceAccountName

  ## Env overrides (--set manager.envOverrides.VAR=value)
  ## Same name in env above: this value takes precedence.
  ##
  envOverrides: {}

  ## Image pull secrets
  ##
  imagePullSecrets: []

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 1000m
      memory: 256Mi
    requests:
      cpu: 20m
      memory: 128Mi

  ## Manager pod's affinity
  ##
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64
            - ppc64le
            - s390x
          - key: kubernetes.io/os
            operator: In
            values:
            - linux

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

  ## Topology spread constraints
  ##
  topologySpreadConstraints: []

  ## PodDisruptionBudget configuration
  ##
  podDisruptionBudget:
    enabled: false
    minAvailable: null
    maxUnavailable: null

  ## Pod metadata
  ##
  pod:
    labels: {}
    annotations: {}

## Helper RBAC roles for managing custom resources
##
rbacHelpers:
  # Install convenience admin/editor/viewer roles for CRDs
  enable: true

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint with RBAC protection.
##
metrics:
  enable: true
  # Metrics server port
  port: 8443

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: true

## Webhook server configuration
##
webhook:
  enable: true
  # Webhook server port
  port: 9443

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false


# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# [APPLICATION]: Application images configuration
application:
  # Image pull policy for Workspaces deployments (Always, IfNotPresent, or Never)
  imagesPullPolicy: IfNotPresent
  # Image registry for Workspaces controller
  imagesRegistry: "docker.io/library"

# [WORKSPACE TEMPLATES]: Default workspace template configuration
workspaceTemplates:
  # Default namespace where workspace templates are stored
  defaultNamespace: "jupyter-k8s-shared"

# [WORKSPACE POD WATCHING]: Configure workspace pod event watching
workspacePodWatching:
  # Whether to enable workspace pod event watching
  # When true, controller watches pod events for workspace lifecycle management
  # When false, pod watching is disabled
  enable: false

# [ACCESS RESOURCES]: Configure resources to watch for access strategy
accessResources:
  # Guided mode using traefik proxy
  traefik:
    # Whether to enable watching traefik resources
    enable: false
  # Additional Group-Version-Kind to watch
  additionalGvk: []

# [EXTENSION_API]: Extension API server configuration
extensionApi:
  # Enable extension API server for WorkspaceConnection
  enable: true
  # JWT issuer and audience claims
  jwtIssuer: "workspaces-controller"
  jwtAudience: "workspaces-controller"
  # K8s-native JWT secret configuration
  # When enabled, JWTs are signed with HMAC keys from a K8s Secret
  # instead of AWS KMS. The secret is rotated by a CronJob.
  jwtSecret:
    enable: false
    secretName: "jupyter-k8s-extensionapi-secrets"
    tokenTTL: "5m"
    newKeyUseDelay: "5s"
    rotationInterval: "15m"
    rotator:
      repository: "docker.io/library"
      imageName: "jupyter-k8s-rotator"
      imageTag: "latest"
      imagePullPolicy: "IfNotPresent"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

# [CONTROLLER]: Controller configuration
controller:
  # Plugin sidecars to deploy alongside the controller
  # Each plugin runs as a sidecar container in the controller pod
  # Example:
  #   plugins:
  #     - name: aws
  #       image:
  #         repository: my-registry/jupyter-k8s-aws-plugin
  #         tag: latest
  #       port: 8080
  #       imagePullPolicy: Always
  #       healthcheckCommand: ["/aws-plugin", "--healthcheck"]
  #       env:
  #         PLUGIN_PORT: "8080"
  #         AWS_REGION: "us-west-2"
  plugins: []
