## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

# -- String to fully override chart.fullname template
fullnameOverride: "jupyter-k8s"

## Configure the controller manager deployment
##
manager:
  # -- Number of controller manager replicas
  replicas: 1

  image:
    # -- Controller image repository
    repository: ghcr.io/jupyter-infra/jupyter-k8s-controller
    # -- Controller image tag (defaults to chart appVersion)
    tag: ""
    # -- Image pull policy
    pullPolicy: IfNotPresent

  # -- Controller manager arguments
  args:
    - --leader-elect

  # -- Environment variables for the controller container
  env:
    - name: CONTROLLER_POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: CONTROLLER_POD_SERVICE_ACCOUNT
      valueFrom:
        fieldRef:
          fieldPath: spec.serviceAccountName
    - name: CLUSTER_ADMIN_GROUP
      value: "cluster-workspace-admin"

  # -- Environment variable overrides (same name in env above: this value takes precedence)
  envOverrides: {}

  # -- Image pull secrets for private registries
  imagePullSecrets: []

  # -- Pod-level security settings
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # -- Container-level security settings
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  # -- Resource limits and requests for the controller container
  resources:
    limits:
      cpu: 1000m
      memory: 256Mi
    requests:
      cpu: 20m
      memory: 128Mi

  # -- Node affinity rules for the manager pod
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64
            - ppc64le
            - s390x
          - key: kubernetes.io/os
            operator: In
            values:
            - linux

  # -- Node selector for the manager pod
  nodeSelector: {}

  # -- Tolerations for the manager pod
  tolerations: []

  # -- Topology spread constraints for the manager pod
  topologySpreadConstraints: []

  # -- PodDisruptionBudget configuration
  podDisruptionBudget:
    # -- Enable PodDisruptionBudget
    enabled: false
    # -- Minimum available pods
    minAvailable: null
    # -- Maximum unavailable pods
    maxUnavailable: null

  # -- Pod metadata
  pod:
    # -- Additional labels for the manager pod
    labels: {}
    # -- Additional annotations for the manager pod
    annotations: {}

## Helper RBAC roles for managing custom resources
##
rbacHelpers:
  # -- Install convenience admin/editor/viewer roles for CRDs
  enable: true

## Custom Resource Definitions
##
crd:
  # -- Install CRDs with the chart
  enable: true
  # -- Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint with RBAC protection.
##
metrics:
  # -- Enable metrics endpoint
  enable: true
  # -- Metrics server port
  port: 8443

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  # -- Enable cert-manager integration (required for webhooks and metrics TLS)
  enable: true

## Webhook server configuration
##
webhook:
  # -- Enable admission webhooks
  enable: true
  # -- Webhook server port
  port: 9443

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  # -- Enable Prometheus ServiceMonitor
  enable: false


# [APPLICATION]: Application images configuration
application:
  # -- Image pull policy for workspace pod containers
  imagesPullPolicy: IfNotPresent
  # -- Image registry prefix for workspace pod containers
  imagesRegistry: "docker.io/library"

# [WORKSPACE TEMPLATES]: Default workspace template configuration
workspaceTemplates:
  # -- Namespace where shared workspace templates are stored
  defaultNamespace: "jupyter-k8s-shared"

# [WORKSPACE POD WATCHING]: Configure workspace pod event watching
workspacePodWatching:
  # -- Enable workspace pod event watching for lifecycle management (required for remote access plugins)
  enable: false

# [ACCESS RESOURCES]: Configure resources to watch for access strategy
accessResources:
  # Guided mode using traefik proxy
  traefik:
    # -- Enable watching Traefik IngressRoute resources
    enable: false
  # -- Additional Group-Version-Kind resources to watch for access strategy
  additionalGvk: []

# [EXTENSION_API]: Extension API server configuration
extensionApi:
  # -- Enable the Extension API server (serves Connection APIs)
  enable: true
  # -- JWT issuer claim
  jwtIssuer: "workspaces-controller"
  # -- JWT audience claim
  jwtAudience: "workspaces-controller"
  # K8s-native JWT secret configuration
  jwtSecret:
    # -- Enable K8s-native JWT signing (HMAC keys from a K8s Secret, rotated by CronJob)
    enable: false
    # -- Name of the Kubernetes Secret holding signing keys
    secretName: "jupyter-k8s-extensionapi-secrets"
    # -- Token time-to-live
    tokenTTL: "5m"
    # -- Delay before using a newly rotated key (allows propagation)
    newKeyUseDelay: "5s"
    # -- How often the CronJob rotates the key
    rotationInterval: "15m"
    rotator:
      # -- Rotator image repository
      repository: "ghcr.io/jupyter-infra"
      # -- Rotator image name
      imageName: "jupyter-k8s-rotator"
      # -- Rotator image tag (defaults to chart appVersion)
      imageTag: ""
      # -- Rotator image pull policy
      imagePullPolicy: "IfNotPresent"
      # -- Rotator resource limits and requests
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

# [CONTROLLER]: Controller configuration
controller:
  # -- Plugin sidecars to deploy alongside the controller. Each plugin runs as a sidecar container in the controller pod.
  plugins: []
  # Example:
  #   plugins:
  #     - name: aws
  #       image:
  #         repository: my-registry/jupyter-k8s-aws-plugin
  #         tag: latest
  #       port: 8080
  #       imagePullPolicy: Always
  #       healthcheckCommand: ["/aws-plugin", "--healthcheck"]
  #       env:
  #         PLUGIN_PORT: "8080"
  #         AWS_REGION: "us-west-2"
