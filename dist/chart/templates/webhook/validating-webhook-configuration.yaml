{{- if .Values.webhook.enable }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    {{- if .Values.certManager.enable }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "jupyter-k8s.resourceName" (dict "suffix" "serving-cert" "context" $) }}
    {{- end }}
  name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "validating-webhook-configuration" "context" $) }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-pods-exec-workspace
      port: 9443
  failurePolicy: Ignore
  name: vpods-exec-workspace-v1.kb.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CONNECT
    resources:
    - pods/exec
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-workspace-jupyter-org-v1alpha1-workspace
      port: 9443
  failurePolicy: Fail
  name: vworkspace-v1alpha1.kb.io
  rules:
  - apiGroups:
    - workspace.jupyter.org
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - workspaces
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-workspace-jupyter-org-v1alpha1-workspacetemplate
      port: 9443
  failurePolicy: Ignore
  name: vworkspacetemplate-v1alpha1.kb.io
  rules:
  - apiGroups:
    - workspace.jupyter.org
    apiVersions:
    - v1alpha1
    operations:
    - UPDATE
    resources:
    - workspacetemplates
  sideEffects: None
{{- end }}
