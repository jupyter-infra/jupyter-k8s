{{- if and .Values.extensionApi.enable .Values.extensionApi.jwtSecret.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: extensionapi-jwt-rotator
    component: security
  name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "jwt-secrets-reader-binding" "context" $) }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "jwt-secrets-reader" "context" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "controller-manager" "context" $) }}
  namespace: {{ .Release.Namespace }}
{{- end }}
