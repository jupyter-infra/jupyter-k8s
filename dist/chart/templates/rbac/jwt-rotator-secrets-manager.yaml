{{- if and .Values.extensionApi.enable .Values.extensionApi.jwtSecret.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: extensionapi-jwt-rotator
    component: security
  name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "jwt-rotator-secrets-manager" "context" $) }}
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups:
  - ""
  resourceNames:
  - {{ .Values.extensionApi.jwtSecret.secretName }}
  resources:
  - secrets
  verbs:
  - get
  - update
  - patch
{{- end }}
