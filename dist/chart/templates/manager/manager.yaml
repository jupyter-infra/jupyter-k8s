apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "jupyter-k8s.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: controller-manager
    workspace.jupyter.org/component: controller
        {{- with .Values.manager.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "controller-manager" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "jupyter-k8s.name" . }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.manager.pod.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "jupyter-k8s.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        control-plane: controller-manager
        workspace.jupyter.org/component: controller
        {{- with .Values.manager.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.manager.affinity }}
      affinity: {{ toYaml . | nindent 10 }}
      {{- end }}
      containers:
      - args:
        {{- if .Values.metrics.enable }}
        - --metrics-bind-address=:{{ .Values.metrics.port }}
        {{- else }}
        # Bind to :0 to disable the controller-runtime managed metrics server
        - --metrics-bind-address=0
        {{- end }}
        - --health-probe-bind-address=:8081
        {{- range .Values.manager.args }}
        - {{ . }}
        {{- end }}
        - "--application-images-pull-policy={{ .Values.application.imagesPullPolicy }}"
        - "--application-images-registry={{ .Values.application.imagesRegistry }}"
        - "--default-template-namespace={{ .Values.workspaceTemplates.defaultNamespace }}"
        {{- if .Values.accessResources.traefik.enable }}
        - --watch-traefik
        {{- end }}
        {{- if .Values.extensionApi.enable }}
        - --enable-extension-api
        {{- if .Values.extensionApi.jwtIssuer }}
        - --jwt-issuer={{ .Values.extensionApi.jwtIssuer }}
        {{- end }}
        {{- if .Values.extensionApi.jwtAudience }}
        - --jwt-audience={{ .Values.extensionApi.jwtAudience }}
        {{- end }}
        {{- end }}
        {{- if and .Values.extensionApi.enable .Values.extensionApi.jwtSecret.enable }}
        - --jwt-secret-name={{ .Values.extensionApi.jwtSecret.secretName }}
        {{- if .Values.extensionApi.jwtSecret.tokenTTL }}
        - --jwt-ttl={{ .Values.extensionApi.jwtSecret.tokenTTL }}
        {{- end }}
        {{- if .Values.extensionApi.jwtSecret.newKeyUseDelay }}
        - --new-key-use-delay={{ .Values.extensionApi.jwtSecret.newKeyUseDelay }}
        {{- end }}
        {{- end }}
        {{- if .Values.workspacePodWatching.enable }}
        - --enable-workspace-pod-watching
        {{- end }}
        {{- if .Values.controller.plugins }}
        - "--plugin-endpoints={{ range $i, $p := .Values.controller.plugins }}{{ if $i }},{{ end }}{{ $p.name }}=http://localhost:{{ $p.port }}{{ end }}"
        {{- end }}
        {{- if .Values.certManager.enable }}
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        {{- end }}
        command:
        - /manager
        env:
{{- if or .Values.manager.env (and (kindIs "map" .Values.manager.envOverrides) (not (empty .Values.manager.envOverrides))) }}
          {{- if .Values.manager.env }}
          {{- toYaml .Values.manager.env | nindent 10 }}
          {{- end }}
          {{- if kindIs "map" .Values.manager.envOverrides }}
          {{- range $k, $v := .Values.manager.envOverrides }}
          - name: {{ $k }}
            value: {{ $v | quote }}
          {{ end }}
          {{- end }}
          {{- else }}
          []
          {{- end }}
        image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}"
        imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: {{ .Values.webhook.port }}
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- if .Values.manager.resources }}
          {{- toYaml .Values.manager.resources | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        securityContext:
          {{- if .Values.manager.securityContext }}
          {{- toYaml .Values.manager.securityContext | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        volumeMounts:
        {{- if .Values.certManager.enable }}
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
        {{- end }}
        - mountPath: /tmp/extension-server/serving-certs
          name: extension-server-cert
          readOnly: true
      {{- range .Values.controller.plugins }}
      - name: plugin-{{ .name }}
        image: "{{ .image.repository }}:{{ .image.tag }}"
        {{- if .imagePullPolicy }}
        imagePullPolicy: {{ .imagePullPolicy }}
        {{- end }}
        ports:
          - containerPort: {{ .port }}
            protocol: TCP
        {{- if .healthcheckCommand }}
        livenessProbe:
          exec:
            command: {{ .healthcheckCommand | toJson }}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command: {{ .healthcheckCommand | toJson }}
          initialDelaySeconds: 2
          periodSeconds: 5
        {{- end }}
        {{- if .env }}
        env:
          {{- range $key, $value := .env }}
          - name: {{ $key }}
            value: "{{ $value }}"
          {{- end }}
        {{- end }}
        {{- if .resources }}
        resources:
          {{- toYaml .resources | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- with .Values.manager.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 10 }}
      {{- end }}
      securityContext:
        {{- if .Values.manager.podSecurityContext }}
        {{- toYaml .Values.manager.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      serviceAccountName: {{ include "jupyter-k8s.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.manager.tolerations }}
      tolerations: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.manager.topologySpreadConstraints }}
      topologySpreadConstraints: {{ toYaml . | nindent 10 }}
      {{- end }}
      volumes:
      {{- if .Values.certManager.enable }}
      - name: webhook-certs
        secret:
          secretName: webhook-server-cert
      {{- end }}
      - name: extension-server-cert
        secret:
          secretName: extension-server-cert
