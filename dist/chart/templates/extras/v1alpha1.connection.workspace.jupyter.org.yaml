{{- if .Values.extensionApi.enable }}
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "jupyter-k8s.resourceName" (dict "suffix" "extension-server-cert" "context" $) }}
  name: v1alpha1.connection.workspace.jupyter.org
spec:
  caBundle: ""
  group: connection.workspace.jupyter.org
  groupPriorityMinimum: 100
  insecureSkipTLSVerify: false
  service:
    name: {{ include "jupyter-k8s.resourceName" (dict "suffix" "extension-server" "context" $) }}
    namespace: {{ .Release.Namespace }}
  version: v1alpha1
  versionPriority: 100
{{- end }}
